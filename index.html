<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vysakh | Redesign Underway</title>
    <style>
        /* --- Reset & Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Strict no-scroll */
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background-color: #0b0d10; /* Deep, premium dark base */
            color: #f0f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Clean, Slow, Ambient Motion Background --- */
        .bg-glow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            filter: blur(100px); /* Heavy blur for an ultra-soft aura */
            opacity: 0.55;
            pointer-events: none;
        }

        .glow-ball {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: float-around infinite alternate ease-in-out;
        }

        /* Ambient Aura 1: Deep Indigo */
        .glow-ball.one {
            width: 65vw;
            height: 65vw;
            top: -20%;
            left: -10%;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.35) 0%, rgba(0,0,0,0) 70%);
            animation-duration: 25s; /* Very slow, calming motion */
        }

        /* Ambient Aura 2: Premium Violet */
        .glow-ball.two {
            width: 55vw;
            height: 55vw;
            bottom: -15%;
            right: -10%;
            background: radial-gradient(circle, rgba(155, 81, 224, 0.3) 0%, rgba(0,0,0,0) 70%);
            animation-duration: 32s;
            animation-delay: -5s;
        }

        /* Ambient Aura 3: Soft Fuchsia Accent */
        .glow-ball.three {
            width: 45vw;
            height: 45vw;
            top: 25%;
            left: 35%;
            background: radial-gradient(circle, rgba(224, 81, 184, 0.15) 0%, rgba(0,0,0,0) 70%);
            animation-duration: 28s;
            animation-delay: -3s;
        }

        @keyframes float-around {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(50px, -40px) scale(1.05); }
            100% { transform: translate(-30px, 30px) scale(0.95); }
        }

        /* --- Minimal Content Layer --- */
        .content-card {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2.5rem;
            max-width: 560px;
            width: 90%;
            animation: cardReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Smooth, Clean Minimal Progress Loader --- */
        .loader-track {
            width: 64px;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            margin: 0 auto 2.5rem auto;
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #9b51e0, #e051b8);
            border-radius: 10px;
            position: absolute;
            animation: fluid-load 2.5s ease-in-out infinite alternate;
        }

        @keyframes fluid-load {
            0% { left: 0%; width: 30%; }
            100% { left: 70%; width: 30%; }
        }

        /* Typography */
        h1 {
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 1.2rem;
            color: #ffffff;
            line-height: 1.25;
        }

        p {
            font-size: 1.05rem;
            font-weight: 300;
            line-height: 1.6;
            color: #9aa0a6; /* Clean, modern muted gray */
            margin-bottom: 3rem;
        }

        /* --- Elegant Action Buttons --- */
        .links-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.35rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 100px;
            color: #e3def2;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(155, 81, 224, 0.4);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(155, 81, 224, 0.1);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 1.9rem; }
            p { font-size: 0.95rem; }
            .links-container { flex-direction: column; width: 100%; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Soft Ambient Shifting Background -->
    <div class="bg-glow-container">
        <div class="glow-ball one"></div>
        <div class="glow-ball two"></div>
        <div class="glow-ball three"></div>
    </div>

    <!-- UI/UX Designer Content Layer -->
    <div class="content-card">
        
        <!-- Elegant, low-profile minimal loader line -->
        <div class="loader-track">
            <div class="loader-bar"></div>
        </div>

        <h1>Refining my digital space.</h1>
        <p>I am currently restructuring my portfolio website to introduce a completely elevated creative experience. I'll be back online soon—in the meantime, let's connect.</p>

        <!-- Social & Contact Redirection Buttons -->
        <div class="links-container">
            <a href="mailto:vysakh.official98@gmail.com" class="btn">Email Me</a>
            <a href="https://wa.me/917022017654" target="_blank" rel="noopener" class="btn">WhatsApp</a>
            <a href="https://www.behance.net/Vysakh_98" target="_blank" rel="noopener" class="btn">Behance</a>
            <a href="https://www.linkedin.com/in/vysakhdesigns/" target="_blank" rel="noopener" class="btn">LinkedIn</a>
        </div>
    </div>

</body>
</html>
