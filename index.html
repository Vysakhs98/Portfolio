<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vysakh S | Retro Portfolio</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Press Start 2P',cursive;
overflow:hidden;
height:100vh;
background:#6ec6f5;
}

.sky{
height:75vh;
background:#6ec6f5;
position:relative;
overflow:hidden;
}

.cloud{
position:absolute;
background:white;
border-radius:50px;
opacity:.9;
}

.cloud::before,
.cloud::after{
content:"";
position:absolute;
background:white;
border-radius:50%;
}

.cloud1{
width:140px;
height:50px;
top:12%;
left:-200px;
animation:moveCloud 35s linear infinite;
}

.cloud1::before{
width:60px;
height:60px;
left:20px;
top:-30px;
}

.cloud1::after{
width:70px;
height:70px;
left:60px;
top:-35px;
}

.cloud2{
width:120px;
height:40px;
top:28%;
left:-180px;
animation:moveCloud 45s linear infinite;
}

.cloud3{
width:100px;
height:35px;
top:45%;
left:-140px;
animation:moveCloud 25s linear infinite;
}

@keyframes moveCloud{
100%{
left:120%;
}
}

.hero{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

.hero h1{
font-size:min(10vw,90px);
color:#ffd800;
text-shadow:
6px 6px 0 #000;
margin-bottom:25px;
}

.hero h2{
font-size:min(3vw,22px);
margin-bottom:25px;
color:#ffffff;
text-shadow:3px 3px 0 #000;
}

.hero p{
max-width:900px;
margin:auto;
line-height:2;
font-size:14px;
color:white;
text-shadow:2px 2px 0 #000;
margin-bottom:35px;
}

.button{
display:inline-block;
padding:18px 28px;
background:#ffd800;
color:black;
text-decoration:none;
border:4px solid black;
box-shadow:6px 6px 0 black;
transition:.15s;
}

.button:hover{
transform:translate(3px,3px);
box-shadow:3px 3px 0 black;
}

.avatar{
position:absolute;
left:60px;
bottom:20px;
width:120px;
height:120px;
border-radius:50%;
border:5px solid black;
background:
url('avatar.png')
center center/cover no-repeat,
white;
animation:bob 2s ease-in-out infinite;
}

@keyframes bob{
50%{
transform:translateY(-12px);
}
}

.status-box{
position:absolute;
top:30px;
right:30px;
background:white;
border:4px solid black;
padding:15px;
font-size:10px;
line-height:2;
}

.grass{
height:40px;
background:#4caf50;
border-top:4px solid black;
}

.ground{
height:25vh;
background:#8b5a2b;
position:relative;
}

.ground::before{
content:"";
position:absolute;
inset:0;
background:
repeating-linear-gradient(
90deg,
rgba(0,0,0,.15) 0 20px,
transparent 20px 40px
);
}

.links{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.links a{
background:white;
color:black;
padding:12px;
text-decoration:none;
border:3px solid black;
font-size:10px;
}

.links a:hover{
background:#ffd800;
}

@media(max-width:768px){

.hero h1{
font-size:52px;
}

.hero h2{
font-size:14px;
}

.hero p{
font-size:11px;
}

.avatar{
display:none;
}

.status-box{
display:none;
}

}

</style>
</head>

<body>

<div class="sky">

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="status-box">
LEVEL STATUS<br>

UI/UX DESIGNER<br>
CASE STUDIES LOADING
</div>

<div class="avatar"></div>

<div class="hero">

<h2>RETRO PORTFOLIO</h2>

<p>
Website currently being redesigned.

Come back soon.
</p>

</div>

</div>

</div>

</div>
