<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vysakh | Redesign Underway</title>
    <style>
        /* --- Reset & Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Strict no-scroll */
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background-color: #0b0d10; /* Deep, premium dark base */
            color: #f0f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Clean, Mouse-Reactive Motion Background --- */
        .bg-glow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            filter: blur(130px); /* Heavy blur for seamless blend over larger travel distances */
            opacity: 0.55;
            pointer-events: none;
        }

        .glow-ball {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            /* Using hardware acceleration transform for butter-smooth mouse movement */
            transform: translate3d(0, 0, 0); 
            will-change: transform;
        }

        /* Ambient Aura 1: Deep Indigo */
        .glow-ball.one {
            width: 65vw;
            height: 65vw;
            top: -20%;
            left: -10%;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.35) 0%, rgba(0,0,0,0) 70%);
        }

        /* Ambient Aura 2: Premium Violet */
        .glow-ball.two {
            width: 55vw;
            height: 55vw;
            bottom: -15%;
            right: -10%;
            background: radial-gradient(circle, rgba(155, 81, 224, 0.3) 0%, rgba(0,0,0,0) 70%);
        }

        /* Ambient Aura 3: Soft Fuchsia Accent */
        .glow-ball.three {
            width: 45vw;
            height: 45vw;
            top: 25%;
            left: 35%;
            background: radial-gradient(circle, rgba(224, 81, 184, 0.15) 0%, rgba(0,0,0,0) 70%);
        }

        /* --- Minimal Content Layer --- */
        .content-card {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2.5rem;
            max-width: 560px;
            width: 90%;
            animation: cardReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h1 {
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 1.2rem;
            color: #ffffff;
            line-height: 1.25;
        }

        p {
            font-size: 1.05rem;
            font-weight: 300;
            line-height: 1.6;
            color: #9aa0a6; /* Clean, modern muted gray */
            margin-bottom: 3rem;
        }

        /* --- Elegant Action Buttons --- */
        .links-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.35rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 100px;
            color: #e3def2;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(155, 81, 224, 0.4);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(155, 81, 224, 0.1);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 1.9rem; }
            p { font-size: 0.95rem; }
            .links-container { flex-direction: column; width: 100%; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Soft Ambient Shifting Background -->
    <div class="bg-glow-container">
        <div class="glow-ball one" id="ball1"></div>
        <div class="glow-ball two" id="ball2"></div>
        <div class="glow-ball three" id="ball3"></div>
    </div>

    <!-- UI/UX Designer Content Layer -->
    <div class="content-card">

        <h1>Refining my digital space.</h1>
        <p>I am currently restructuring my portfolio website to introduce a completely elevated creative experience. I'll be back online as soon as possible.
            In the meantime, let's connect.</p>

        <!-- Social & Contact Redirection Buttons -->
        <div class="links-container">
            <a href="mailto:vysakh.official98@gmail.com" class="btn">Email Me</a>
            <a href="https://wa.me/917022017654" target="_blank" rel="noopener" class="btn">WhatsApp</a>
            <a href="https://www.behance.net/Vysakh_98" target="_blank" rel="noopener" class="btn">Behance</a>
            <a href="https://www.linkedin.com/in/vysakhdesigns/" target="_blank" rel="noopener" class="btn">LinkedIn</a>
        </div>
    </div>

    <!-- Ultra-smooth fluid mouse interaction script -->
    <script>
        const ball1 = document.getElementById('ball1');
        const ball2 = document.getElementById('ball2');
        const ball3 = document.getElementById('ball3');

        // Track targets (mouse position) and current actual locations
        let mouseX = 0, mouseY = 0;
        let currentX1 = 0, currentY1 = 0;
        let currentX2 = 0, currentY2 = 0;
        let currentX3 = 0, currentY3 = 0;

        window.addEventListener('mousemove', (e) => {
            // Normalize mouse coords relative to window center (-0.5 to 0.5)
            mouseX = (e.clientX / window.innerWidth) - 0.5;
            mouseY = (e.clientY / window.innerHeight) - 0.5;
        });

        function animate() {
            // Adjust the multiplier for travel distance. 
            // Ball 1 moves standard, Ball 2 inverse, Ball 3 subtle offset.
            const targetX1 = mouseX * 180;
            const targetY1 = mouseY * 120;
            
            const targetX2 = mouseX * -150;
            const targetY2 = mouseY * -150;
            
            const targetX3 = mouseX * 100;
            const targetY3 = mouseY * 190;

            // Fluid easing factor (lower number = smoother, heavier lag)
            const ease = 0.04;

            currentX1 += (targetX1 - currentX1) * ease;
            currentY1 += (targetY1 - currentY1) * ease;

            currentX2 += (targetX2 - currentX2) * ease;
            currentY2 += (targetY2 - currentY2) * ease;

            currentX3 += (targetX3 - currentX3) * ease;
            currentY3 += (targetY3 - currentY3) * ease;

            // Render updates using high-performance 3D translate
            ball1.style.transform = `translate3d(${currentX1}px, ${currentY1}px, 0)`;
            ball2.style.transform = `translate3d(${currentX2}px, ${currentY2}px, 0)`;
            ball3.style.transform = `translate3d(${currentX3}px, ${currentY3}px, 0)`;

            requestAnimationFrame(animate);
        }

        // Start the elegant requestAnimationFrame loop
        animate();
    </script>

</body>
</html>
