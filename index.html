<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolving Into Something New</title>
    <style>
        /* --- Reset & Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Strict no-scroll */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0d10; /* Deep, premium dark base */
            color: #f0f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Gemini-Inspired Moving Background --- */
        .bg-glow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            filter: blur(80px); /* Blends the shifting shapes into a smooth aura */
            opacity: 0.6;
        }

        .glow-ball {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: float-around infinite alternate ease-in-out;
        }

        /* Ambient Aura 1: Deep Indigo */
        .glow-ball.one {
            width: 60vw;
            height: 60vw;
            top: -20%;
            left: -10%;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.4) 0%, rgba(0,0,0,0) 70%);
            animation-duration: 12s;
        }

        /* Ambient Aura 2: Gemini Purple/Violet */
        .glow-ball.two {
            width: 50vw;
            height: 50vw;
            bottom: -10%;
            right: -10%;
            background: radial-gradient(circle, rgba(155, 81, 224, 0.35) 0%, rgba(0,0,0,0) 70%);
            animation-duration: 18s;
            animation-delay: -4s;
        }

        /* Ambient Aura 3: Soft Cyan/Teal Highlight */
        .glow-ball.three {
            width: 40vw;
            height: 40vw;
            top: 30%;
            left: 40%;
            background: radial-gradient(circle, rgba(80, 227, 194, 0.2) 0%, rgba(0,0,0,0) 70%);
            animation-duration: 15s;
            animation-delay: -2s;
        }

        @keyframes float-around {
            0% {
                transform: translate(0px, 0px) scale(1);
            }
            50% {
                transform: translate(40px, -60px) scale(1.1);
            }
            100% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* --- Elegant Minimal Content Layer --- */
        main {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        /* Minimal animated icon/accent */
        .accent-spark {
            display: inline-block;
            width: 24px;
            height: 24px;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #9b51e0, #4a90e2);
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 8px rgba(155,81,224,0.6)); }
        }

        /* Classy Typography */
        h1 {
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            margin-bottom: 1.2rem;
            color: #ffffff;
            line-height: 1.2;
        }

        p {
            font-size: 1.05rem;
            font-weight: 300;
            line-height: 1.6;
            color: #9aa0a6; /* Clean, legible muted gray */
            letter-spacing: 0.01em;
        }

        /* Subtly fading in content on load */
        .fade-in {
            animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-glow-container">
        <div class="glow-ball one"></div>
        <div class="glow-ball two"></div>
        <div class="glow-ball three"></div>
    </div>

    <main class="fade-in">
        <div class="accent-spark"></div>
        <h1>I am refining my digital space.</h1>
        <p>My website is currently undergoing a thoughtful redesign to bring you an elevated experience. I will bring it back online soon.</p>
    </main>

</body>
</html>
